<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY GATE - 門禁監控系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --panel-bg: #1a1a2e;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 標題裝飾 */
        .header {
            position: absolute;
            top: 40px;
            text-align: center;
            letter-spacing: 4px;
        }

        .header h1 { margin: 0; font-size: 2rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

        /* 艙門外框 */
        .gate-frame {
            position: relative;
            width: 320px;
            height: 400px;
            border: 4px solid #333;
            background: #000;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* 左右門片 */
        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1e2a38 0%, #000000 100%);
            z-index: 10;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-door { left: 0; border-right: 2px solid var(--neon-blue); }
        .right-door { right: 0; border-left: 2px solid var(--neon-blue); }

        /* 中央發光條 */
        .door-light {
            position: absolute;
            width: 4px;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            z-index: 11;
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.5s;
        }

        /* 門內內容 (QR Code) */
        .inner-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        #qrcode {
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* 狀態面板 */
        .status-panel {
            margin-top: 40px;
            padding: 12px 40px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        #status-text {
            color: var(--neon-blue);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* 動態樣式：開門 */
        .gate-frame.open .left-door { transform: translateX(-100%); }
        .gate-frame.open .right-door { transform: translateX(100%); }
        .gate-frame.open .door-light { opacity: 0; }
        .gate-frame.open { border-color: var(--neon-green); box-shadow: 0 0 40px var(--neon-green); }

        .access-granted #status-text { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="header">
        <h1>GALAXY GATE</h1>
        <p style="font-size: 0.6rem; color: #444; margin-top: 5px;">SECURITY CLEARANCE REQUIRED</p>
    </div>

    <div class="gate-frame" id="gateFrame">
        <div class="door-light"></div>
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        
        <div class="inner-content">
            <div id="qrcode"></div>
            <p style="margin-top: 20px; font-size: 0.6rem; color: #666; letter-spacing: 1px;">WAITING FOR SCAN</p>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="status-text">SYSTEM LOCKED</div>
    </div>

    <script>
        // 1. 初始化 Supabase
        const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. 抓取組件
        const gateFrame = document.getElementById('gateFrame');
        const statusPanel = document.getElementById('statusPanel');
        const statusText = document.getElementById('status-text');

        // 3. 獲取或生成 Session ID
        const urlParams = new URLSearchParams(window.location.search);
        // 優先從網址抓 sid (Deno 傳過來的)，沒有的話就隨機生成一個
        const sessionId = urlParams.get('sid') || Math.random().toString(36).substring(2, 10).toUpperCase();

        // 製作指向 GitHub Pages 的 QR Code
        const scanUrl = `https://web-ctrler.github.io/QRCODE/index.html?sid=${sessionId}`;

        new QRCode(document.getElementById("qrcode"), {
            text: scanUrl,
            width: 160,
            height: 160,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        console.log("閘門初始化完成，Session ID:", sessionId);

        // 4. Realtime 監聽：當有新裝置掃碼並 insert 進 devices 表格時
        supabase
            .channel('gate_channel')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'devices',
                filter: `session_id=eq.${sessionId}` 
            }, payload => {
                console.log("接收到授權訊號:", payload.new);
                handleAccessGranted(payload.new);
            })
            .subscribe();

        // 5. 授權成功處理
        function handleAccessGranted(deviceData) {
            // 視覺動畫
            gateFrame.classList.add('open');
            statusPanel.classList.add('access-granted');
            statusText.innerText = "ACCESS GRANTED";

            // 語音反饋
            const welcomeMsg = `授權成功。歡迎進入，偵測到裝置：${deviceData.device_name}。門已開啟。`;
            const utter = new SpeechSynthesisUtterance(welcomeMsg);
            utter.lang = 'zh-TW';
            utter.rate = 1.1; // 稍微快一點更有科技感
            window.speechSynthesis.speak(utter);

            // 8 秒後自動重啟，準備下一次驗證
            setTimeout(() => {
                gateFrame.classList.remove('open');
                statusPanel.classList.remove('access-granted');
                statusText.innerText = "SYSTEM LOCKED";
                
                // 1.5 秒後重整頁面（更換 SID）
                setTimeout(() => location.reload(), 1500);
            }, 8000);
        }
    </script>
</body>
</html>
