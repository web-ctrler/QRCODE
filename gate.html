<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY GATE - 指揮中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --panel-bg: #1a1a2e;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .header { position: absolute; top: 40px; text-align: center; letter-spacing: 4px; }
        .header h1 { margin: 0; font-size: 2rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

        .gate-frame {
            position: relative;
            width: 320px;
            height: 400px;
            border: 4px solid #333;
            background: #000;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1e2a38 0%, #000000 100%);
            z-index: 10;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
            border: 1px solid #444;
        }

        .left-door { left: 0; border-right: 2px solid var(--neon-blue); }
        .right-door { right: 0; border-left: 2px solid var(--neon-blue); }

        .door-light {
            position: absolute;
            width: 4px;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            z-index: 11;
            left: 50%;
            transform: translateX(-50%);
        }

        .inner-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
        }

        .status-panel {
            margin-top: 40px;
            padding: 12px 40px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 50px;
            text-align: center;
        }

        #status-text { color: var(--neon-blue); font-size: 0.8rem; letter-spacing: 3px; }

        /* 動態樣式 */
        .gate-frame.open .left-door { transform: translateX(-100%); }
        .gate-frame.open .right-door { transform: translateX(100%); }
        .gate-frame.open { border-color: var(--neon-green); box-shadow: 0 0 40px var(--neon-green); }
        .access-granted #status-text { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="header">
        <h1>GALAXY GATE</h1>
        <p style="font-size: 0.6rem; color: #444; margin-top: 5px;">COMMAND CENTER ACTIVE</p>
    </div>

    <div class="gate-frame" id="gateFrame">
        <div class="door-light"></div>
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        
        <div class="inner-content">
            <div style="text-align: center;">
                <div id="lock-icon" style="font-size: 3rem; color: var(--neon-blue); opacity: 0.3;">🔒</div>
                <p style="font-size: 0.6rem; color: var(--neon-blue); margin-top: 10px;">SECURED AREA</p>
            </div>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="status-text">SYSTEM STANDBY - READY</div>
    </div>

    <script>
        // 1. 初始化 Supabase
        const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const gateFrame = document.getElementById('gateFrame');
        const statusPanel = document.getElementById('statusPanel');
        const statusText = document.getElementById('status-text');
        const lockIcon = document.getElementById('lock-icon');

        // 2. 監聽資料庫更新 (實時連線)
        supabaseClient
            .channel('gate_realtime')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'devices' 
            }, payload => {
                // 如果有人掃碼成功，狀態變為 'opened'
                if (payload.new.gate_state === 'opened') {
                    handleAccessGranted(payload.new);
                }
            }).subscribe();

        // 3. 處理開門動作
        function handleAccessGranted(deviceData) {
            // UI 動畫
            gateFrame.classList.add('open');
            statusPanel.classList.add('access-granted');
            statusText.innerText = "ACCESS GRANTED";
            lockIcon.innerText = "🔓";

            // 語音反饋
            const welcomeMsg = `授權成功。歡迎進入。`;
            const utter = new SpeechSynthesisUtterance(welcomeMsg);
            utter.lang = 'zh-TW';
            window.speechSynthesis.speak(utter);

            // 8 秒後自動關門並恢復待機
            setTimeout(() => {
                gateFrame.classList.remove('open');
                statusPanel.classList.remove('access-granted');
                statusText.innerText = "SYSTEM STANDBY - READY";
                lockIcon.innerText = "🔒";
            }, 8000);
        }
    </script>
</body>
</html>
