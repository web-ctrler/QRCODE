<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY GATE - 通行授權</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --panel-bg: #1a1a2e;
        }

        body { 
            font-family: 'Orbitron', -apple-system, sans-serif; 
            background: var(--bg-dark); 
            color: white;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
            overflow: hidden;
        }

        .card { 
            background: var(--panel-bg); 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); 
            border: 1px solid var(--neon-blue);
            width: 85%; 
            max-width: 320px; 
            transition: all 0.3s ease;
        }

        /* 讀取動畫 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--neon-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 通用文字設定 */
        h2 { font-size: 1.2rem; color: var(--neon-blue); margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #888; font-size: 0.8rem; line-height: 1.5; margin-bottom: 20px; }
        
        /* 成功/失敗狀態 */
        .success-card { border-color: var(--neon-green); box-shadow: 0 0 30px rgba(57, 255, 20, 0.5); }
        .success-text { color: var(--neon-green) !important; text-shadow: 0 0 10px var(--neon-green); }
        
        .error-card { border-color: var(--neon-red); box-shadow: 0 0 30px rgba(255, 49, 49, 0.5); }
        .error-text { color: var(--neon-red) !important; }
        
        /* 倒數計時 */
        #redirect-timer { font-size: 1.2rem; font-weight: bold; color: white; margin-top: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="loading-view">
        <div class="loader"></div>
        <h2>身份驗證中</h2>
        <p>正在與 Galaxy Gate 核心進行加密通訊...</p>
    </div>

    <div id="result-view" class="hidden">
        <h2 id="status-title"></h2>
        <p id="status-msg"></p>
        
        <div id="redirect-info" class="hidden">
            <p style="margin-bottom:5px; color:#aaa;">正在傳送至閘門畫面...</p>
            <div id="redirect-timer">3</div>
        </div>

        <div style="margin-top: 30px; font-size: 0.6rem; color: #333;">
            SID: <span id="sid-display"></span>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 設定區 (須與 gate.html 完全一致)
    // ==========================================
    const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
    
    // 初始化 Supabase 客戶端
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==========================================
    // 2. 邏輯處理區
    // ==========================================
    
    // 取得網址中的 Session ID (?sid=xxx)
    const urlParams = new URLSearchParams(window.location.search);
    const sid = urlParams.get('sid');
    const cardEl = document.getElementById('main-card');

    async function processAuthentication() {
        // A. 驗證 SID 是否存在
        if (!sid) {
            showResult("❌ 無效請求", "未偵測到 Session ID。<br>請重新掃描閘門 QR Code。", "error");
            return;
        }

        document.getElementById('sid-display').innerText = sid;

        try {
            // B. 獲取手機裝置資訊
            const ua = navigator.userAgent;
            const os = /android/i.test(ua) ? "Android" : /iPhone|iPad/i.test(ua) ? "iOS" : "Web";
            
            // 嘗試提取型號 (iPhone, Pixel 8 等)
            let model = "Unknown Device";
            const modelMatch = ua.match(/\(([^;]+);/);
            if (modelMatch) model = modelMatch[1];

            // C. 寫入 Supabase 資料庫
            // 這一步會觸發電腦端 gate.html 的監聽器並開門
            const { error } = await supabaseClient
                .from('devices')
                .insert([{ 
                    device_name: model, 
                    os_version: os, 
                    ip_address: "Mobile-Authorized",
                    session_id: sid 
                }]);

            if (error) throw error;

            // D. 驗證成功，顯示結果並啟動跳轉倒數
            showResult("✅ 驗證成功", "通行權限已獲得。<br>閘門正在開啟，準備傳送...", "success");
            startRedirectTimer();

        } catch (err) {
            console.error('Supabase Error:', err);
            showResult("❌ 授權失敗", `代碼: ${err.message || 'Unknown'} <br>請確認網路連線。`, "error");
        }
    }

    // 顯示結果 UI
    function showResult(title, msg, type) {
        document.getElementById('loading-view').classList.add('hidden');
        const resultView = document.getElementById('result-view');
        const titleEl = document.getElementById('status-title');
        
        resultView.classList.remove('hidden');
        titleEl.innerHTML = title; // 使用 innerHTML 允許文字換行
        document.getElementById('status-msg').innerHTML = msg;

        if (type === "success") {
            cardEl.classList.add('success-card');
            titleEl.classList.add('success-text');
        } else {
            cardEl.classList.add('error-card');
            titleEl.classList.add('error-text');
        }
    }

    // 執行跳轉倒數邏輯 (關鍵改動)
    function startRedirectTimer() {
        const redirectInfo = document.getElementById('redirect-info');
        const timerEl = document.getElementById('redirect-timer');
        redirectInfo.classList.remove('hidden');

        let timeLeft = 3; // 3秒倒數

        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                
                // 3秒後自動跳轉到電腦端頁面
                // 這樣手機也會顯示開門動畫
                // 注意：這假設 gate.html 在同一個 GitHub 資料夾下
                window.location.href = `gate.html?sid=${sid}`; 
            }
        }, 1000);
    }

    // 頁面完全載入後開始執行驗證
    window.onload = processAuthentication;
</script>

</body>
</html>
