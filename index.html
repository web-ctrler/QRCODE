<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY PASS - 數位通行卡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #050505;
            --panel-bg: #1a1a2e;
        }
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: var(--bg-dark); 
            color: white;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .card { 
            background: var(--panel-bg); 
            padding: 2.5rem; border-radius: 30px; 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2); 
            border: 2px solid var(--neon-blue);
            width: 85%; max-width: 320px; text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }
        #qrcode {
            background: white; padding: 15px; border-radius: 15px;
            display: inline-block; margin: 25px 0;
        }
        .status-dot {
            width: 10px; height: 10px; background: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px var(--neon-green);
        }
        #sid-text { font-size: 0.8rem; color: var(--neon-blue); letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h2 style="font-size: 1.2rem; letter-spacing: 4px; margin: 0;">GALAXY PASS</h2>
    <p style="font-size: 0.7rem; color: #666; margin-top: 5px;">LEVEL 4 AUTHORIZATION</p>
    
    <div id="qrcode"></div>

    <div style="margin-top: 10px;">
        <span class="status-dot"></span>
        <span id="sid-text">INITIALIZING...</span>
    </div>
</div>

<script>
    // 1. 基本設定
    const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. 生成新的 Auth Token (對應新的 SQL 欄位)
    const myToken = Math.random().toString(36).substring(2, 12).toUpperCase();
    document.getElementById('sid-text').innerText = `TOKEN: ${myToken}`;

    // 3. 產生 QR Code (指令內容)
    const secretCommand = `GATE_OPEN_CMD:${myToken}`;
    new QRCode(document.getElementById("qrcode"), {
        text: secretCommand,
        width: 180,
        height: 180,
        correctLevel : QRCode.CorrectLevel.H
    });

    // 4. 啟動資料庫連線與監聽
    async function startListening() {
        try {
            // 向資料庫註冊紀錄 (使用全新欄位名)
            const { error } = await supabaseClient
                .from('devices')
                .insert([{ 
                    auth_token: myToken,      // 對應 SQL: auth_token
                    gate_state: 'waiting',    // 對應 SQL: gate_state
                    device_tag: 'Galaxy-Mobile-Pass' // 對應 SQL: device_tag
                }]);

            if (error) throw error;

            // 監聽狀態更新 (監聽 gate_state 欄位)
            supabaseClient.channel('gate-realtime')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'devices',
                    filter: `auth_token=eq.${myToken}` 
                }, (payload) => {
                    // 如果大門端將狀態改為 'opened'
                    if (payload.new.gate_state === 'opened') {
                        document.getElementById('mainCard').style.borderColor = '#39ff14';
                        document.getElementById('mainCard').style.boxShadow = '0 0 50px rgba(57, 255, 20, 0.4)';
                        document.getElementById('sid-text').innerText = "ACCESS GRANTED";
                        document.getElementById('sid-text').style.color = '#39ff14';
                        
                        // 5 秒後重置，準備下一次通行
                        setTimeout(() => location.reload(), 5000);
                    }
                }).subscribe();
                
        } catch (err) {
            console.error("連線錯誤:", err.message);
            document.getElementById('sid-text').innerText = "SYSTEM ERROR";
            document.getElementById('sid-text').style.color = "red";
        }
    }

    startListening();
</script>
</body>
</html>
