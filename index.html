<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY PASS - 手機通行證</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #050505;
            --panel-bg: #1a1a2e;
        }

        body { 
            font-family: 'Orbitron', sans-serif; 
            background: var(--bg-dark); 
            color: white;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: var(--panel-bg); 
            padding: 2rem; 
            border-radius: 24px; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); 
            border: 1px solid var(--neon-blue);
            width: 80%; 
            max-width: 320px; 
            text-align: center;
        }

        #qrcode {
            background: white;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        h2 { font-size: 1.1rem; color: var(--neon-blue); margin-bottom: 5px; letter-spacing: 2px; }
        p { color: #888; font-size: 0.75rem; margin-bottom: 10px; }
        
        .status-box {
            font-size: 0.7rem;
            color: #444;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 10px;
        }

        #sid-display { color: var(--neon-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>GALAXY PASS</h2>
    <p>請出示此碼對準閘門掃描儀</p>
    
    <div id="qrcode"></div>

    <div class="status-box">
        SID: <span id="sid-display">LOADING...</span>
        <div id="auth-status" style="margin-top: 5px; color: var(--neon-green);">● 等待掃描中</div>
    </div>
</div>

<script>
    // 1. 基本配置 (與 gate.html 一致)
    const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. 生成此裝置唯一的 Session ID
    const mySid = Math.random().toString(36).substring(2, 10).toUpperCase();
    document.getElementById('sid-display').innerText = mySid;

    // 3. 產生 QR Code
    // 內容設為此 sid，這樣當電腦端掃到這串字串時，就能去資料庫對應
    new QRCode(document.getElementById("qrcode"), {
        text: mySid, 
        width: 180,
        height: 180,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // 4. 監聽閘門狀態 (Realtime)
    // 當電腦端掃描此 ID 並將資料庫中的狀態更新為 "success" 時，手機自動跳轉
    async function watchMyGate() {
        // 先在資料庫建立一個「待命」紀錄
        await supabaseClient.from('devices').insert([{ session_id: mySid, status: 'pending', device_name: 'Mobile-Pass' }]);

        // 訂閱頻道
        supabaseClient
            .channel('gate-watch')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'devices',
                filter: `session_id=eq.${mySid}` 
            }, (payload) => {
                if (payload.new.status === 'success') {
                    // 如果電腦端驗證通過，手機端也跟著跳轉到 gate.html 顯示開門動畫
                    window.location.href = `gate.html?sid=${mySid}`;
                }
            })
            .subscribe();
    }

    watchMyGate();
</script>

</body>
</html>
