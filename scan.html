<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY SCANNER - 掃描終端</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --error-red: #ff3131;
            --panel-bg: #0a0a1a;
        }

        body {
            margin: 0;
            background: #000;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            margin-top: 30px;
            text-align: center;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            width: 80%;
        }

        /* 掃描器容器 */
        #reader {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            border: 1px solid var(--neon-blue) !important;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* 掃描狀態顯示 */
        .scan-info {
            margin-top: 25px;
            padding: 15px 30px;
            background: var(--panel-bg);
            border-radius: 10px;
            border-left: 5px solid var(--neon-blue);
            width: 80%;
            max-width: 360px;
        }

        #status-label { font-size: 0.7rem; color: #555; }
        #status-msg { font-size: 1rem; margin-top: 5px; letter-spacing: 2px; }

        /* 掃描紀錄 log */
        .log-panel {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #333;
            font-family: monospace;
            max-width: 80%;
            word-break: break-all;
        }

        /* 成功/失敗的動畫類別 */
        .success { border-left-color: var(--neon-green) !important; color: var(--neon-green); }
        .error { border-left-color: var(--error-red) !important; color: var(--error-red); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 5px;">SCANNER UNIT</h2>
        <p style="font-size: 0.6rem; color: #444; margin-top: 5px;">V.2.0 BIOMETRIC GATEWAY</p>
    </div>

    <div id="reader"></div>

    <div class="scan-info" id="statusBox">
        <div id="status-label">CURRENT SYSTEM STATUS</div>
        <div id="status-msg">READY TO SCAN...</div>
    </div>

    <div class="log-panel" id="logPanel">LOG: SYSTEM_IDLE</div>

    <script>
        // 1. 初始化 Supabase
        const SUPABASE_URL = 'https://qwvhlizfkvdfjyrglroi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmhsaXpma3ZkZmp5cmdscm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzUyOTUsImV4cCI6MjA5MDYxMTI5NX0.eUq7QQ4QKaHtTotp0UI0cPIPngPOnm0fugyAhAgJCF8';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const statusBox = document.getElementById('statusBox');
        const statusMsg = document.getElementById('status-msg');
        const logPanel = document.getElementById('logPanel');

        // 2. 當掃描成功的處理邏輯
        async function onScanSuccess(decodedText) {
            logPanel.innerText = `LOG: DETECTED -> ${decodedText}`;
            
            // 檢查是否為正確的開門指令格式
            if (decodedText.startsWith("GATE_OPEN_CMD:")) {
                const token = decodedText.split(":")[1];
                
                statusMsg.innerText = "VERIFYING TOKEN...";
                statusBox.className = "scan-info"; // 重置顏色

                // 核心：更新資料庫 gate_state 為 opened
                const { data, error } = await supabaseClient
                    .from('devices')
                    .update({ gate_state: 'opened' })
                    .eq('auth_token', token);

                if (error) {
                    showStatus("VERIFICATION FAILED", "error");
                    console.error("Update Error:", error.message);
                } else {
                    showStatus("ACCESS GRANTED", "success");
                    
                    // 暫停掃描 3 秒，防止重複觸發
                    html5QrcodeScanner.pause();
                    setTimeout(() => {
                        html5QrcodeScanner.resume();
                        showStatus("READY TO SCAN...", "normal");
                    }, 3000);
                }
            } else {
                showStatus("INVALID PASS FORMAT", "error");
            }
        }

        // 輔助函式：更新 UI 狀態
        function showStatus(text, type) {
            statusMsg.innerText = text;
            statusBox.className = "scan-info " + type;
            if (type === 'error') {
                setTimeout(() => showStatus("READY TO SCAN...", "normal"), 2000);
            }
        }

        // 3. 設定掃描器
        // 建議 fps 設定 10-20 之間，qrbox 是中間那個對焦框的大小
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 // 強制正方形預覽
        });

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
